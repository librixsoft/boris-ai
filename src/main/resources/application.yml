  context-size: 32000
  port: 1234
  threads: 8
  version: "@project.version@"
  logo-color: "BLUE"
  # ---------------------------------------------------------------------------
  # Conexion al motor llama.cpp (proceso llama-server)
  # ---------------------------------------------------------------------------
  # URL logica del motor: {inference.scheme}://{inference.host}:{boris.port}
  # Esta base alimenta spring.ai.openai.base-url para que ChatClient hable con llama.cpp.
  # - localhost: cuando el wrapper y llama-server corren en la misma maquina.
  # - IP LAN (ej. 192.168.x.xx): cuando el motor corre en otra maquina de la red.
  # Nota: esto NO define los endpoints del wrapper Spring; solo el destino del backend IA.
  inference:
    scheme: http
    host: 127.0.0.1
  # ---------------------------------------------------------------------------
  # App pública (este proceso Spring / Tomcat)
  # ---------------------------------------------------------------------------
  # URL lógica: {app.scheme}://{app.host}:{server.port}
  # Úsala en despliegues detrás de NAT/LAN: pon aquí el host o IP con el que los clientes
  # alcanzan esta app (logs, Thymeleaf, fetch relativo vs. absoluto en clientes externos).
  app:
    # http o https si un reverse proxy termina TLS
    scheme: http
    # loopback por defecto; en red local ej. 192.168.1.66
    host: 127.0.0.1

  # ---------------------------------------------------------------------------
   # Paths HTTP de esta aplicación
   # ---------------------------------------------------------------------------
   # - server: rutas del proceso llama.cpp original (inference:port).
   # - wrapper: rutas del API propio de Boris (server.port).
  api:
     paths:
       llamaServer:
         # Prefijo del API nativo en llama-server
         v1: /v1
         # Health del motor llama.cpp
         models: /v1/models
       borisServer:
         v1: /api/v1
         chat-completions: /chat/completions
         status: /status
         ui: /boris-ui

server:
  port: 9999
  # Aumentar el timeout para peticiones asíncronas (Streaming) a 5 minutos
  # Necesario para modelos grandes (20B+) que pueden tardar en el prefill inicial.
  mvc:
    async:
      request-timeout: 300000
# application.yml
# ---------------------------------------------------------------------------
# CONFIGURACIÓN DE LOGS - CONTROL DE LLAMA.CPP VS SPRING
# ---------------------------------------------------------------------------
# PARA APAGAR LOGS DE LLAMA.CPP (configuración actual):
# - root: WARN (nivel global mínimo)
# - com.boris.librixsoft.llama: WARN (silencia logs del wrapper llama)
# - org.slf4j: WARN (reduce ruido del framework de logging)
# - org.springframework: DEBUG (mantiene logs de Spring visibles)
#
# PARA ENCENDER LOGS DE LLAMA.CPP:
# - Cambia root: INFO o DEBUG
# - Cambia com.boris.librixsoft.llama: DEBUG
# - Mantén org.slf4j: INFO
#
# PARA VER SOLO SPRING (producción):
# - root: ERROR
# - com.boris.librixsoft.llama: ERROR
# - org.springframework: WARN
# ---------------------------------------------------------------------------
# ===========================================================================
# LOGGING PROFILES — descomenta el bloque que necesites y comenta el otro
# ===========================================================================

# ---------------------------------------------------------------------------
# [PERFIL ACTIVO] DEBUG MEDIO — Spring visible, llama.cpp silenciado
# Úsalo para desarrollo normal: ves Spring AI, web y Boris sin ruido del motor.
# ---------------------------------------------------------------------------
logging:
  level:
    org.springframework.ai: INFO
    com.boris: INFO
    root: INFO
    com.boris.librixsoft.llama: INFO
    org.slf4j: INFO
    org.springframework: INFO
spring:
  mvc:
    async:
      request-timeout: 300000
  devtools:
    add-properties: false  # Disable DevTools automatic property configuration
    livereload:
      enabled: true
    restart:
      additional-paths: src/main/resources/templates,src/main/resources/static
  ai:
    openai:
      base-url: ${boris.inference.scheme}://${boris.inference.host}:${boris.port}
      api-key: "no-key-needed"
      chat:
        options:
          # NOTA: Se recomienda mantener parallel-tool-calls en false para máxima compatibilidad
          # con modelos locales (llama-server) que no soportan este parámetro de OpenAI.
          parallel-tool-calls: true