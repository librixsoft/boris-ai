    # -------------------------------------------------------------------------

    # DeepSeek R1 - Distill Qwen 7B (Lógica pura / CoT)
    # - id: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M"
    #   name: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"
    #   context-size: 16384
